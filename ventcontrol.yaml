substitutions:
  node_name: "vent-control"
  friendly_name: "Vent Control"

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  project:
    name: "Soesjie78.VentControl"
    version: "1.0"
  on_boot:
    priority: -100 
    then:
      - lambda: !lambda |-
          id(ventcontrol).make_call().set_value(0).perform();

dashboard_import:
  package_url: github://soesjie78/esphome-vent-control/ventcontrol.yaml
  import_full_config: true

esp8266:
  board: d1_mini
  restore_from_flash: true

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "/3yXG4fsj664dzLTDmq/SQm0oWTkRgR7rebo/9ohpw0="

ota:
  - platform: esphome
    password: "8b500c02bafb645029283c6a2c11298f"

improv_serial:

wifi:
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Vent-Control Setup"
    password: ""

captive_portal:

web_server:
  port: 80

text_sensor:
  - platform: version
    name: ESPHome Version
  - platform: wifi_info
    ip_address:
      name: IP
    ssid:
      name: SSID
    bssid:
      name: BSSID

sensor:
  - platform: uptime
    name: Vent Control Uptime
  - platform: wifi_signal
    name: Vent Control WiFi Signal
    update_interval: 60s

output:
  - platform: esp8266_pwm
    id: output1
    pin: D4
    frequency: 50 Hz

servo:
  - id: servo1
    output: output1
    auto_detach_time: 5s # shutdown power to servo after x seconds
    transition_length: 2s # speed of servo, with 0s being the fastes
    min_level: 3% # calibration
    idle_level: 7.5% # calibration
    max_level: 12.5% # calibration

script:
  - id: open_vent_script
    then:
      - lambda: |-
          float limit = id(maxswing).state;
          float set_value = 0;

          if (id(moduleorientation).current_option() == std::string("Left")) {
            set_value = limit;
          } else {
            set_value = -limit;
          }
          id(servo1).write(set_value/100);
  - id: close_vent_script
    then:
      - lambda: |-
          float limit = id(maxswing).state;
          float set_value = 0;

          if (id(moduleorientation).current_option() == std::string("Left")) {
            set_value = -limit;
          } else {
            set_value = limit;
          }
          id(servo1).write(set_value/100);

button:
  - platform: template
    name: "Vent Close"
    id: vent_open
    icon: "mdi:air-filter"
    on_press:
      then:
        - script.execute: close_vent_script
  - platform: template
    name: "Vent Open"
    id: vent_close
    icon: "mdi:air-filter"
    on_press:
      then:
        - script.execute: open_vent_script

number:
  - platform: template
    id: ventcontrol
    name: "Vent Control"
    optimistic: True
    min_value: -100
    max_value: 100
    initial_value: 0
    step: 1
    set_action:
      then:
        - lambda: !lambda |-
            id(servo1).write(x/100);
  - platform: template
    name: "Max swing (10-100%)"
    id: maxswing
    initial_value: 80
    restore_value: true
    min_value: 10
    max_value: 100
    optimistic: true
    mode: box
    unit_of_measurement: "%"
    step: 1
    icon: mdi:arrow-oscillating

select:
  - platform: template
    name: "Module orientation"
    id: moduleorientation
    optimistic: True
    options:
      - Left
      - Right
    restore_value: True
    initial_option: Left
    icon: mdi:orbit-variant


